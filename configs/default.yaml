paths:
  base_sequences_csv: data/processed/ML_Ready_Sequences.csv
  mainshock_catalog_csv: data/raw/USGS_Mw6.0_Depth70_1970-2023.csv
  event_catalog_csv: data/raw/USGS_Mw4.0_Depth70_1970-2023.csv
  plate_boundaries_geojson: data/raw/PB2002_boundaries.json
  gcmt_catalog_csv: data/raw/GlobalCMT_1976-2024.csv
  advanced_features_csv: data/processed/advanced_features.csv
  model_dir: data/models
  submission_csv: data/processed/submission.csv

phase1:
  obs_days: 3.0
  spatial_radius_km: 100.0
  earth_radius_km: 6371.0
  gr:
    mag_col: mag
    mc: null
    bin_width: 0.1
    min_events: 5
  omori:
    time_col: time
    min_events: 8
    p_bounds: [0.2, 2.5]
    c_bounds: [0.0001, 10.0]
    initial_p: 1.0
    initial_c: 0.05
    boundary_tol: 0.0001
    fit_start_day: 0.0
  anisotropy:
    lat_col: latitude
    lon_col: longitude
    min_events: 3
    ratio_epsilon: 1.0e-9
  geology:
    enabled: true
    lat_col: mainshock_lat
    lon_col: mainshock_lon
    type_field: STEP_CLASS
    fallback_type_field: Type
    distance_crs: EPSG:3857
    unknown_type: UNK
    subduction_label: SUB
    one_hot_types: [SUB, OTF, OSR, UNK]
  gcmt:
    enabled: true
    auto_download: true
    start_year: 1976
    end_year: 2024
    request_sleep: 0.2
    time_window_days: 1.0
    time_tolerance_seconds: 60.0
    spatial_radius_km: 50.0

parallel:
  n_jobs: -1
  backend: loky
  verbose: 0
  max_nbytes: 64M

# ============================================================
#  Transformer 深度学习模型配置
# ============================================================
transformer:
  # --- 序列构建 ---
  obs_days: 3.0
  spatial_radius_km: 100.0
  earth_radius_km: 6371.0
  max_seq_len: 256

  # --- 模型架构 ---
  d_model: 128
  nhead: 4
  num_layers: 3
  dim_feedforward: 256
  dropout: 0.1
  global_hidden_dim: 128
  fusion_hidden_dim: 128

  # --- 训练超参 ---
  epochs: 50
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  warmup_steps: 100
  grad_clip_norm: 1.0
  late_weight: 2.0

  # --- 预处理器 ---
  scaler_type: robust
  add_missing_indicators: true
  time_target_transform: log1p

  # --- OOF 验证 ---
  n_splits: 5
  purge_days: 30.0

  # --- Early Stopping ---
  early_stopping_patience: 10
  early_stopping_min_delta: 0.001

  # --- CUDA / 性能 ---
  device: auto               # auto / cuda / cpu
  num_workers: 0             # DataLoader workers (0=主进程, >0=多进程预加载)
  pin_memory: true           # pin_memory 加速 CPU→GPU 数据传输
  use_torch_compile: false   # torch.compile (PyTorch >= 2.0)

# ============================================================
#  ST-GNN 图神经网络模型配置
# ============================================================
gnn:
  # --- 序列构建 ---
  obs_days: 3.0
  spatial_radius_km: 100.0
  earth_radius_km: 6371.0
  max_seq_len: 256

  # --- 模型架构 ---
  node_hidden_dim: 64
  num_gnn_layers: 3
  gnn_sigma: 50.0
  gnn_radius_km: 100.0
  gru_hidden_dim: 64
  gru_layers: 2
  global_hidden_dim: 128
  fusion_hidden_dim: 128
  dropout: 0.1

  # --- 训练超参 ---
  epochs: 50
  batch_size: 16
  lr: 0.001
  weight_decay: 0.0001
  late_weight: 2.0

  # --- 预处理器 ---
  scaler_type: robust
  add_missing_indicators: true

  # --- OOF 验证 ---
  n_splits: 5
  purge_days: 30.0

  # --- CUDA / 性能 ---
  device: auto
  num_workers: 0
  pin_memory: true
  use_torch_compile: false

# ============================================================
#  LightGBM 树模型配置
# ============================================================
lightgbm:
  device: auto               # auto / cuda / cpu
  gpu_use_dp: false          # GPU 双精度模式

# ============================================================
#  全局 CUDA 设置
# ============================================================
cuda:
  deterministic: false       # 可复现模式（会降低性能）
  allow_tf32: true           # TF32 加速 (Ampere+ GPU)
  matmul_precision: high     # 'highest' / 'high' / 'medium'
